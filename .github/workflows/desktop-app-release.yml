# Creates a GitHub Release on desktop-v* tags (metadata only).
# Attach the DMG manually: gh release upload <tag> desktop-app/dist/release/*.dmg
# See desktop-app/README.md → Releasing (maintainers).

name: desktop-app-release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            macOS desktop app for the cf-proxy4localllm laptop bridge.

            ## Install

            1. Download **`CF-Local-LLM-Bridge-*-macOS.dmg`** below.
            2. Open the DMG and drag **CF Local LLM Bridge** to Applications.
            3. Open the app → **Settings** → save hub token → **Connect**.

            Universal binary (Apple Silicon + Intel). Native SwiftUI app with menu bar status and embedded Go bridge.

            Full setup guide: [desktop-app/README.md](https://github.com/${{ github.repository }}/blob/main/desktop-app/README.md)
