# Creates a GitHub Release on desktop-v* tags.
# DMG is built locally (desktop-app source is not in git) and attached with:
#   gh release create desktop-v0.1.0 ... desktop-app/dist/release/*.dmg
# See desktop-app/README.md → Releasing (maintainers).

name: desktop-app-release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## CF Local LLM Bridge

            Download **`CF-Local-LLM-Bridge-*-macOS.dmg`** from the **Assets** section below.

            If no DMG is attached yet, a maintainer must build and upload it:

            ```bash
            ./desktop-app/scripts/package-dmg.sh
            gh release upload ${{ github.ref_name }} desktop-app/dist/release/*.dmg
            ```

            Install and usage: [desktop-app/README.md](https://github.com/${{ github.repository }}/blob/main/desktop-app/README.md)
