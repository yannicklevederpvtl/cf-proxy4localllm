# Bridge tests only — desktop app source is not in this repository.
# Release DMGs are built locally and uploaded to GitHub Releases (see desktop-app/README.md).

name: desktop-app

on:
  push:
    paths:
      - 'bridge/**'
      - '.github/workflows/desktop-app.yml'
  pull_request:
    paths:
      - 'bridge/**'
      - '.github/workflows/desktop-app.yml'

jobs:
  bridge-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: bridge/go.sum
      - name: Bridge tests
        run: cd bridge && go test ./...
